voltages:
  VDD:
    display_name: DRAM VDD
    aliases: [VDD, DRAM Voltage, Memory VDD]
    platform_scope: [all]
    description: Main DDR5 DRAM supply voltage.
    affects: [DRAM core, CAS voltage scaling, heat]
    typical_stock_range: [1.10, 1.25]
    typical_daily_tuned_range: [1.30, 1.45]
    aggressive_range: [1.46, 1.60]
    platform_ranges:
      intel_ddr5:
        low: [1.10, 1.25]
        average: [1.26, 1.45]
        elevated: [1.46, 1.60]
      amd_am5:
        low: [1.10, 1.25]
        average: [1.26, 1.45]
        elevated: [1.46, 1.55]
    danger_notes: [High DRAM voltage increases module heat; aggressive overclocking ranges are not a stability or safety guarantee.]
    heat_impact: high
    confidence: medium
    sources: &ddr5_sources
      - url: https://www.micron.com/products/memory/dram-components/ddr5-sdram
        source_name: Micron DDR5 technology overview
        source_tier: 1
        confidence: high
        notes: DDR5 nominal voltage and technology baseline.
        date_checked: "2026-05-17"
  VDDQ:
    display_name: DRAM VDDQ
    aliases: [VDDQ, DRAM VDDQ]
    platform_scope: [all]
    description: DDR5 I/O supply voltage for memory signaling.
    affects: [I/O signaling, memory bus stability, heat]
    typical_stock_range: [1.10, 1.25]
    typical_daily_tuned_range: [1.30, 1.45]
    aggressive_range: [1.46, 1.55]
    platform_ranges:
      intel_ddr5:
        low: [1.10, 1.25]
        average: [1.26, 1.45]
        elevated: [1.46, 1.55]
      amd_am5:
        low: [1.10, 1.25]
        average: [1.26, 1.45]
        elevated: [1.46, 1.50]
    danger_notes: [High VDDQ can increase heat and signaling risk; more is not automatically better.]
    heat_impact: high
    confidence: medium
    sources: *ddr5_sources
  VPP:
    display_name: DRAM VPP
    aliases: [VPP]
    platform_scope: [all]
    description: DDR5 wordline boost-related supply; usually left near nominal.
    affects: [DRAM internals]
    typical_stock_range: [1.80, 1.80]
    typical_daily_tuned_range: [1.80, 1.80]
    aggressive_range: [1.81, 1.90]
    platform_ranges:
      intel_ddr5:
        low: [1.80, 1.80]
        average: [1.80, 1.80]
        elevated: [1.81, 1.90]
      amd_am5:
        low: [1.80, 1.80]
        average: [1.80, 1.80]
        elevated: [1.81, 1.90]
    danger_notes: [Usually left at nominal; not a primary memory tuning lever.]
    heat_impact: low
    confidence: high
    sources: *ddr5_sources
  VCCSA:
    display_name: Intel VCCSA / System Agent
    aliases: [VCCSA, System Agent, SA Voltage]
    platform_scope: [alder_lake_ddr5, raptor_lake_ddr5]
    description: Intel system agent voltage; can affect memory controller/platform training.
    affects: [IMC, PCIe/system agent domain, training]
    typical_stock_range: [0.90, 1.10]
    typical_daily_tuned_range: [1.10, 1.35]
    aggressive_range: [1.36, 1.45]
    platform_ranges:
      intel_ddr5:
        low: [0.90, 1.10]
        average: [1.11, 1.35]
        elevated: [1.36, 1.45]
    danger_notes: [System Agent tolerance varies by CPU; high values add CPU-side risk without guaranteeing memory training.]
    heat_impact: medium
    confidence: medium
    sources:
      - url: https://www.overclockers.com/ddr5-overclocking-guide/
        source_name: Overclockers DDR5 overclocking guide
        source_tier: 2
        confidence: medium
        notes: Intel DDR5 OC voltage context.
        date_checked: "2026-05-17"
  CPU_VDDQ:
    display_name: Intel CPU VDDQ / TX VDDQ
    aliases: [CPU VDDQ, IVR Transmitter VDDQ, TX VDDQ, VDDQ TX]
    platform_scope: [alder_lake_ddr5, raptor_lake_ddr5, arrow_lake_ddr5]
    description: CPU-side memory I/O voltage naming varies by board.
    affects: [IMC signaling, high-frequency training]
    typical_stock_range: [1.10, 1.20]
    typical_daily_tuned_range: [1.20, 1.45]
    aggressive_range: [1.46, 1.55]
    platform_ranges:
      intel_ddr5:
        low: [1.10, 1.20]
        average: [1.21, 1.45]
        elevated: [1.46, 1.55]
    danger_notes: ["Board labels vary; CPU VDDQ, TX VDDQ, and IVR transmitter VDDQ are often related naming surfaces."]
    heat_impact: medium
    confidence: low
    sources:
      - url: https://skatterbencher.com/2021/11/04/alder-lake-overclocking-whats-new/
        source_name: SkatterBencher Alder Lake OC overview
        source_tier: 2
        confidence: medium
        notes: Names CPU VDDQ/VccDDQ and Intel OC voltage domains.
        date_checked: "2026-05-17"
  MC_Voltage:
    display_name: Intel MC Voltage / VDD2
    aliases: [MC Voltage, IMC Voltage, VDD2]
    platform_scope: [alder_lake_ddr5, raptor_lake_ddr5, arrow_lake_ddr5]
    description: Board-specific memory-controller voltage label.
    affects: [IMC training, high-frequency stability]
    typical_stock_range: [1.10, 1.25]
    typical_daily_tuned_range: [1.25, 1.50]
    aggressive_range: [1.51, 1.60]
    platform_ranges:
      intel_ddr5:
        low: [1.10, 1.25]
        average: [1.26, 1.50]
        elevated: [1.51, 1.60]
    danger_notes: [Verify board manual naming before interpreting.]
    heat_impact: medium
    confidence: low
    sources: []
  SoC:
    display_name: AMD SoC
    aliases: [SoC, VDDCR_SOC, SOC Voltage]
    platform_scope: [ryzen_am5_zen4, ryzen_am5_zen5]
    description: AMD SoC voltage affecting memory controller and related fabric domains.
    affects: [UCLK/MCLK stability, IMC, SoC heat]
    typical_stock_range: [0.95, 1.15]
    typical_daily_tuned_range: [1.16, 1.25]
    aggressive_range: [1.26, 1.30]
    platform_ranges:
      amd_am5:
        low: [0.95, 1.15]
        average: [1.16, 1.25]
        elevated: [1.26, 1.30]
    danger_notes: [AM5 SoC voltage has platform risk history; keep high values deliberate.]
    heat_impact: medium
    confidence: medium
    sources:
      - url: https://download.amd.com/documents/AMD-Ryzen-Processor-and-AMD-Ryzen-Master-Overclocking-Users-Guide.pdf
        source_name: AMD Ryzen Master Overclocking User Guide
        source_tier: 1
        confidence: high
        notes: AMD overclocking controls and warranty caution.
        date_checked: "2026-05-17"
  VDDIO_MEM:
    display_name: AMD VDDIO MEM / CPU memory I/O
    aliases: [VDDIO MEM, VDDIO, MEM VDDIO]
    platform_scope: [ryzen_am5_zen4, ryzen_am5_zen5]
    description: AMD memory I/O voltage.
    affects: [Memory signaling, UCLK/MCLK training]
    typical_stock_range: [1.10, 1.20]
    typical_daily_tuned_range: [1.20, 1.45]
    aggressive_range: [1.46, 1.55]
    platform_ranges:
      amd_am5:
        low: [1.10, 1.20]
        average: [1.21, 1.45]
        elevated: [1.46, 1.55]
    danger_notes: [Often set near memory VDDQ by some profiles; do not assume that is required.]
    heat_impact: medium
    confidence: low
    sources: []
  VDDP:
    display_name: AMD VDDP
    aliases: [VDDP, CLDO VDDP]
    platform_scope: [ryzen_am5_zen4, ryzen_am5_zen5]
    description: AMD memory PHY-related voltage.
    affects: [Training, memory PHY behavior]
    typical_stock_range: [0.85, 0.95]
    typical_daily_tuned_range: [0.90, 1.05]
    aggressive_range: [1.06, 1.15]
    platform_ranges:
      amd_am5:
        low: [0.85, 0.95]
        average: [0.96, 1.05]
        elevated: [1.06, 1.15]
    danger_notes: [Small changes can matter; not a universal fix.]
    heat_impact: low
    confidence: low
    sources: []
